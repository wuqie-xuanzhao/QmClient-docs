name: Sync Docs to Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr-to-upstream:
    name: Create PR to Upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout submodule
        uses: actions/checkout@v5
        with:
          repository: wuqie-xuanzhao/QmClient-docs
          path: QmClient-docs
          fetch-depth: 1

      - name: Get commit info
        id: info
        run: |
          cd QmClient-docs
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci')" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh pr create \
            --repo wxj881027/QmClient \
            --base master \
            --title "docs: 同步 QmClient-docs 至 ${{ steps.info.outputs.commit }}" \
            --body "## 文档同步

QmClient-docs 子模块有新更新

| 项目 | 值 |
|------|-----|
| Commit | \`${{ steps.info.outputs.commit }}\` |
| 更新时间 | ${{ steps.info.outputs.date }} |
| 提交信息 | ${{ steps.info.outputs.message }} |

## 变更内容

此 PR 更新主仓库的子模块引用，请审核并合并。

---
*自动由 GitHub Actions 生成*" \
            || echo "PR creation skipped (may already exist or no permission)"

  notify-forks:
    name: Notify Forks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Create notification issue
        uses: actions/create-issue@v1
        with:
          title: "[自动通知] QmClient-docs 已更新"
          body: |
            ## 文档子模块已更新

            **Commit**: \`${{ steps.info.outputs.commit }}\`
            **更新时间**: ${{ steps.info.outputs.date }}

            ### 同步命令

            如果你fork了 QmClient，请执行以下命令同步文档子模块：

            ```bash
            git fetch origin
            git pull origin main
            git submodule update --remote docs/dyl/QmClient_docs
            git add docs/dyl/QmClient_docs
            git commit -m "sync: 更新文档子模块"
            git push
            ```

            ---
            *此通知由 GitHub Actions 自动生成*
          token: ${{ secrets.NOTIFY_TOKEN }}
        continue-on-error: true
