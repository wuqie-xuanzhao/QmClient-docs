name: Sync Docs to Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Create PR to Upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Get commit info
        id: info
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo wxj881027/QmClient \
            --base master \
            --title "docs: sync from QmClient-docs" \
            --body "QmClient-docs updated: ${{ steps.info.outputs.commit }}"
